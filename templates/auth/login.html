{% extends "base.html" %}
{% block title %}Logowanie — Kanapowy Leniwiec{% endblock %}
{% block content %}
<div style="max-width:400px;margin:48px auto;background:#fff;border:1px solid var(--b);border-radius:16px;padding:32px">
  <div style="text-align:center;margin-bottom:24px">
    <div style="font-size:36px;margin-bottom:8px">🛋️</div>
    <h1 style="font-size:20px;font-weight:700;color:var(--t);margin-bottom:4px">Witaj z powrotem</h1>
    <p style="font-size:13px;color:var(--m)">Zaloguj się do swojego konta</p>
  </div>

  <a href="/auth/google" style="width:100%;height:40px;border:1px solid var(--b);border-radius:var(--r8);background:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--t);text-decoration:none;transition:background .15s;margin-bottom:16px" onmouseover="this.style.background='#f6f6f7'" onmouseout="this.style.background='#fff'">
    <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Zaloguj przez Google
  </a>

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:11px;color:var(--h)">
    <div style="flex:1;height:0.5px;background:var(--b)"></div>lub emailem<div style="flex:1;height:0.5px;background:var(--b)"></div>
  </div>

  <form method="POST">
    <div style="margin-bottom:14px">
      <label style="font-size:12px;color:var(--m);display:block;margin-bottom:5px">Email</label>
      <input type="email" name="email" value="{{ email or '' }}" placeholder="ty@email.com" required
        style="width:100%;height:38px;padding:0 12px;border:1px solid var(--b);border-radius:var(--r8);font-size:13px;outline:none;color:var(--t);background:#fff;transition:border-color .15s"
        onfocus="this.style.borderColor='#534AB7'" onblur="this.style.borderColor='var(--b)'">
    </div>
    <div style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <label style="font-size:12px;color:var(--m)">Hasło</label>
        <span style="font-size:11px;color:#534AB7;cursor:pointer">Zapomniałem hasła</span>
      </div>
      <input type="password" name="password" placeholder="••••••••" required
        style="width:100%;height:38px;padding:0 12px;border:1px solid var(--b);border-radius:var(--r8);font-size:13px;outline:none;color:var(--t);background:#fff;transition:border-color .15s"
        onfocus="this.style.borderColor='#534AB7'" onblur="this.style.borderColor='var(--b)'">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <input type="checkbox" name="remember" id="remember" style="accent-color:#534AB7">
      <label for="remember" style="font-size:12px;color:var(--m);cursor:pointer">Zapamiętaj mnie</label>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;height:40px;border-radius:var(--r8);font-size:13px;justify-content:center">Zaloguj się</button>
  </form>

  <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--m)">
    Nie masz konta? <a href="/auth/register" style="color:#534AB7;font-weight:500;text-decoration:none">Zarejestruj się za darmo</a>
  </div>
</div>
{% endblock %}
