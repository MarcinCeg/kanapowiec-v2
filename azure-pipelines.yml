trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.11'
  appName: 'kanapowiec-v2'

stages:

# ══ STAGE 1: BUILD + TEST ══════════════════════════════════════════════════════
- stage: Build
  displayName: 'Build i testy'
  jobs:
  - job: BuildJob
    displayName: 'Python build'
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Python $(pythonVersion)'

    - script: pip install -r requirements.txt
      displayName: 'pip install'

    - script: |
        python3 -m py_compile app.py models.py auth.py routes.py \
          tmdb_service.py titles_service.py payments.py ai_service.py config.py
        echo "Syntax check OK"
      displayName: 'Syntax check'

    - task: Docker@2
      displayName: 'Docker build'
      inputs:
        command: build
        dockerfile: Dockerfile
        tags: '$(Build.BuildId)'

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)'
        artifactName: 'kanapowiec'

# ══ STAGE 2: DEPLOY na Azure Web App ══════════════════════════════════════════
- stage: Deploy
  displayName: 'Deploy na Azure'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployWebApp
    displayName: 'Azure Web App deploy'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          - task: AzureWebApp@1
            displayName: 'Deploy do Azure App Service'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              appType: 'webAppLinux'
              appName: '$(appName)'
              package: '$(Pipeline.Workspace)/kanapowiec'
              runtimeStack: 'PYTHON|3.11'
              startUpCommand: 'gunicorn "app:create_app()" --bind 0.0.0.0:8000 --workers 2 --timeout 120'
